<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>Подбор одежды для собаки</title>

<!-- иконка сайта -->
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/616/616408.png">

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9966,#ff5e62);
margin:0;
padding:40px;
text-align:center;
}

.container{
background:white;
padding:40px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input,select{
width:90%;
padding:12px;
margin:10px 0;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#ff5e62;
color:white;
border:none;
padding:14px 30px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.tip{
margin-top:10px;
color:#666;
}

.shop{
display:inline-block;
margin-top:25px;
background:#2ecc71;
color:white;
padding:14px 25px;
border-radius:8px;
text-decoration:none;
}

img{
max-width:100%;
border-radius:10px;
margin-top:15px;
}

.measure{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>🐶 Подбор одежды для собаки</h1>

<p>Введите параметры питомца</p>

<select id="breed">
<option value="">Порода (необязательно)</option>
<option>Чихуахуа</option>
<option>Йоркширский терьер</option>
<option>Шпиц</option>
<option>Французский бульдог</option>
<option>Такса</option>
<option>Другая</option>
</select>

<input id="neck" type="number" placeholder="Обхват шеи (см)">
<input id="chest" type="number" placeholder="Обхват груди (см)">
<input id="back" type="number" placeholder="Длина спины (см)">

<button onclick="calc()">Подобрать размер</button>

<div class="result" id="result"></div>
<div class="tip" id="tip"></div>

<a class="shop" href="https://www.avito.ru" target="_blank">
Посмотреть одежду
</a>

<div class="measure">

<h3>Как измерить собаку</h3>

<img src="https://dogland.tomsk.ru/uploads/posts/2020-07/1595076447_kak-izmerit-sobaku.png">

</div>

</div>

<script>

function calc(){

let chest = Number(document.getElementById("chest").value);
let back = Number(document.getElementById("back").value);
let neck = Number(document.getElementById("neck").value);

if(!chest || !back || !neck){
alert("Введите все параметры");
return;
}

let size="";
let tip="";
let image="";

/* XS */

if(chest <= 30 && back <= 25 && neck <= 22){
size="XS";
tip="Идеально для маленьких собак";
image="https://i.imgur.com/3ZQ3Z9K.png";
}

/* S */

else if(chest <= 36 && back <= 30 && neck <= 26){
size="S";
tip="Подходит для небольших пород";
image="https://i.imgur.com/V3KwfYy.png";
}

/* M */

else if(chest <= 42 && back <= 35 && neck <= 30){
size="M";
tip="Хорошо подойдет для средних собак";
image="https://i.imgur.com/QF8v3Uu.png";
}

/* L */

else{
size="L";
tip="Подходит для крупных собак";
image="https://i.imgur.com/5pC0J9F.png";
}

document.getElementById("result").innerHTML =
"Рекомендуемый размер: " + size;

document.getElementById("tip").innerHTML = tip;

let dogImg = document.getElementById("dogImage");
dogImg.src = image;
dogImg.style.display = "block";

}

</script>

</body>
</html>
