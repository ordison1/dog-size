<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Подбор одежды для собаки</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9966,#ff5e62);
margin:0;
padding:40px;
text-align:center;
}

.container{
background:white;
padding:40px;
border-radius:15px;
max-width:450px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
margin-bottom:10px;
}

p{
color:#555;
}

input,select{
width:90%;
padding:12px;
margin:10px 0;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#ff5e62;
color:white;
border:none;
padding:14px 30px;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff3b3f;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#333;
}

.tip{
margin-top:10px;
color:#666;
font-size:14px;
}

.shop{
display:inline-block;
margin-top:25px;
background:#2ecc71;
color:white;
padding:14px 25px;
border-radius:8px;
text-decoration:none;
font-size:16px;
}

.shop:hover{
background:#27ae60;
}

</style>
</head>

<body>

<div class="container">

<h1>🐶 Подбор одежды для собаки</h1>

<p>Введите параметры питомца</p>

<select id="breed">
<option>Выберите породу</option>
<option>Чихуахуа</option>
<option>Йоркширский терьер</option>
<option>Шпиц</option>
<option>Французский бульдог</option>
<option>Другая</option>
</select>

<input id="chest" type="number" placeholder="Обхват груди (см)">
<input id="back" type="number" placeholder="Длина спины (см)">

<button onclick="calc()">Подобрать размер</button>

<div class="result" id="result"></div>
<div class="tip" id="tip"></div>

<a class="shop" href="https://www.avito.ru" target="_blank">
Посмотреть одежду
</a>

</div>

<script>

function calc(){

let chest = document.getElementById("chest").value;
let back = document.getElementById("back").value;

if(!chest || !back){
alert("Введите параметры собаки");
return;
}

let size="";
let tip="";

if(chest <= 30){
size="XS";
tip="Идеально для маленьких собак";
}
else if(chest <= 36){
size="S";
tip="Подходит для небольших пород";
}
else if(chest <= 42){
size="M";
tip="Хорошо подойдет для средних собак";
}
else{
size="L";
tip="Подходит для крупных собак";
}

document.getElementById("result").innerHTML =
"Рекомендуемый размер: " + size;

document.getElementById("tip").innerHTML = tip;

}

</script>

</body>
</html>
