<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Подбор одежды для собаки</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9966,#ff5e62);
margin:0;
padding:40px;
text-align:center;
}

.container{
background:white;
padding:40px;
border-radius:15px;
max-width:450px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input,select{
width:90%;
padding:12px;
margin:10px 0;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#ff5e62;
color:white;
border:none;
padding:14px 30px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.tip{
margin-top:10px;
color:#666;
}

.shop{
display:inline-block;
margin-top:25px;
background:#2ecc71;
color:white;
padding:14px 25px;
border-radius:8px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>🐶 Подбор одежды для собаки</h1>

<p>Введите параметры питомца</p>

<select id="breed">
<option value="">Порода (необязательно)</option>
<option>Чихуахуа</option>
<option>Йоркширский терьер</option>
<option>Шпиц</option>
<option>Французский бульдог</option>
<option>Такса</option>
<option>Другая</option>
</select>

<input id="neck" type="number" placeholder="Обхват шеи (см)">
<input id="chest" type="number" placeholder="Обхват груди (см)">
<input id="back" type="number" placeholder="Длина спины (см)">

<button onclick="calc()">Подобрать размер</button>

<div class="result" id="result"></div>
<div class="tip" id="tip"></div>

<a class="shop" href="https://www.avito.ru" target="_blank">
Посмотреть одежду
</a>

</div>

<script>

function calc(){

let chest = Number(document.getElementById("chest").value);
let back = Number(document.getElementById("back").value);
let neck = Number(document.getElementById("neck").value);
let breed = document.getElementById("breed").value;

if(!chest || !back || !neck){
alert("Введите все параметры собаки");
return;
}

let size="";
let tip="";

/* XS */

if(
chest <= 30 &&
back <= 25 &&
neck <= 22
){
size="XS";
tip="Подходит для маленьких собак";
}

/* S */

else if(
chest <= 36 &&
back <= 30 &&
neck <= 26
){
size="S";
tip="Подходит для небольших пород";
}

/* M */

else if(
chest <= 42 &&
back <= 35 &&
neck <= 30
){
size="M";
tip="Хорошо подойдет для средних собак";
}

/* L */

else{
size="L";
tip="Подходит для крупных собак";
}

let breedText = breed ? "<br>Порода: "+breed : "";

document.getElementById("result").innerHTML =
"Рекомендуемый размер: " + size + breedText;

document.getElementById("tip").innerHTML = tip;

}

</script>

</body>
</html>
